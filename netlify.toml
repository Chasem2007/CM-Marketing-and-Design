# =====================================================================
# NETLIFY CONFIGURATION
# =====================================================================
# This file tells Netlify how to build and deploy your site.
# It also sets up the serverless functions directory.

[build]
  command = "npm install && chmod +x ./node_modules/.bin/vite && ./node_modules/.bin/vite build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_ENV = "development"

# Single-page app routing — sends all URLs to index.html
# so React can handle the routing (prevents 404s on page refresh)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
